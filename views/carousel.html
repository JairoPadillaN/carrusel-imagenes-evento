<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Carrusel de Medios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playball&family=Petit+Formal+Script&family=Lobster&family=Cookie&family=Agbalumo&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/carousel.css">
</head>
<body>

  <div id="stage">
    <div class="slide trans-fade" id="slide-a" data-orientation="">
      <div class="bg-layer"></div>
      <div class="fg-layer"></div>
    </div>
    <div class="slide trans-fade" id="slide-b" data-orientation="">
      <div class="bg-layer"></div>
      <div class="fg-layer"></div>
    </div>
  </div>

  <div id="phrase-container" aria-live="polite">
    <div id="phrase-text"></div>
  </div>

  <button id="mute-btn" type="button" aria-label="Silenciar video" title="Silenciar / activar sonido">
    <svg id="icon-muted" viewBox="0 0 24 24" width="26" height="26">
      <path d="M16.5 12c0-1.77-.77-3.29-2-4.28v2.21l1.94 1.94c.03-.15.06-.29.06-.45v-.42zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
    </svg>
    <svg id="icon-unmuted" viewBox="0 0 24 24" width="26" height="26">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2-4.28v8.56c1.23-.99 2-2.51 2-4.28zM14.5 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
    </svg>
  </button>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/assets/js/carousel.js"></script>
</body>
</html>
