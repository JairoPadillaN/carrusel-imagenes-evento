<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar · Panel del evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <span class="mark">✦ Panel del evento</span>
      <span class="sub">Acceso administrativo</span>

      <div id="login-alert"></div>

      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Contrasena</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-block" id="login-btn">Ingresar</button>
      <p class="help-text" style="text-align:center; margin-top:1.2rem;">
        Acceso local para el administrador del evento.
      </p>
    </form>
  </div>

  <script src="/assets/js/login.js"></script>
</body>
</html>
